<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Browser Relay</title>
    <!-- Set theme before paint to avoid flash -->
    <script src="theme-init.js"></script>
    <style>
      *, ::before, ::after { box-sizing: border-box; }

      :root {
        --bg-page:    #f9fafb;
        --bg-card:    #ffffff;
        --bg-subtle:  #f3f4f6;
        --border:     #e5e7eb;
        --border-in:  #d1d5db;
        --text-1:     #111827;
        --text-2:     #6b7280;
        --text-ph:    #9ca3af;
        --blue:       #2563eb;
        --blue-h:     #1d4ed8;
        --blue-ring:  rgb(37 99 235 / 0.12);
        --blue-bg:    #dbeafe;
        --green:      #16a34a;
        --red:        #dc2626;
        --shadow:     0 1px 2px 0 rgb(0 0 0 / 0.05);
      }
      [data-theme="dark"] {
        --bg-page:    #0f172a;
        --bg-card:    #1e293b;
        --bg-subtle:  #0f172a;
        --border:     #334155;
        --border-in:  #475569;
        --text-1:     #f1f5f9;
        --text-2:     #94a3b8;
        --text-ph:    #64748b;
        --blue:       #3b82f6;
        --blue-h:     #2563eb;
        --blue-ring:  rgb(59 130 246 / 0.15);
        --blue-bg:    rgb(59 130 246 / 0.15);
        --green:      #4ade80;
        --red:        #f87171;
        --shadow:     0 1px 3px 0 rgb(0 0 0 / 0.4);
      }

      html, body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-page);
        color: var(--text-1);
        transition: background 0.2s, color 0.2s;
      }

      .wrap {
        max-width: 600px;
        margin: 40px auto;
        padding: 0 24px 48px;
      }

      /* ── Header ─────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }
      .logo {
        width: 40px; height: 40px;
        border-radius: 8px;
        background: var(--blue-bg);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .logo img { width: 24px; height: 24px; }
      h1 { font-size: 17px; font-weight: 600; margin: 0; color: var(--text-1); }
      .subtitle { font-size: 13px; color: var(--text-2); margin: 2px 0 0; }

      /* ── Cards ──────────────────────────────── */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        box-shadow: var(--shadow);
        margin-bottom: 12px;
      }
      .card h2 {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-2);
        margin: 0 0 12px;
      }
      .card p { font-size: 13px; color: var(--text-2); margin: 6px 0 0; }

      /* ── Buttons ────────────────────────────── */
      button {
        padding: 7px 13px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        background: var(--blue);
        border: 1px solid var(--blue);
        color: #fff;
      }
      button:hover  { background: var(--blue-h); border-color: var(--blue-h); }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.45; cursor: default; }

      /* ── Inputs ─────────────────────────────── */
      input {
        padding: 7px 11px;
        border-radius: 6px;
        border: 1px solid var(--border-in);
        font-size: 13px;
        color: var(--text-1);
        background: var(--bg-card);
        outline: none;
        font-family: inherit;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px var(--blue-ring);
      }
      input::placeholder { color: var(--text-ph); }

      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--text-2);
        margin-bottom: 6px;
      }

      .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

      /* ── Status ─────────────────────────────── */
      .status { margin-top: 8px; font-size: 12px; color: var(--text-2); min-height: 16px; }
      .status[data-kind='ok']    { color: var(--green); }
      .status[data-kind='error'] { color: var(--red); }

      /* ── Toggle switch ──────────────────────── */
      .toggle-row { display: flex; align-items: center; gap: 10px; }
      .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
      .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
      .toggle-track {
        position: absolute; inset: 0; border-radius: 20px;
        background: var(--border-in); cursor: pointer; transition: background 0.2s;
      }
      .toggle input:checked + .toggle-track { background: var(--blue); }
      .toggle-track::after {
        content: ''; position: absolute; top: 2px; left: 2px;
        width: 16px; height: 16px; border-radius: 50%;
        background: #fff; transition: transform 0.2s;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.2);
      }
      .toggle input:checked + .toggle-track::after { transform: translateX(16px); }
      .toggle-label { font-size: 14px; font-weight: 500; cursor: pointer; margin: 0; color: var(--text-1); }

      /* ── Theme segmented control ────────────── */
      .theme-seg {
        display: inline-flex;
        border: 1px solid var(--border);
        border-radius: 6px;
        overflow: hidden;
        background: var(--bg-subtle);
      }
      .seg-btn {
        padding: 5px 12px;
        border: none;
        border-radius: 0;
        background: transparent;
        color: var(--text-2);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .seg-btn:hover  { background: var(--bg-card); color: var(--text-1); border-color: transparent; }
      .seg-btn:active { transform: none; }
      .seg-btn.active { background: var(--blue); color: #fff; }
      .seg-btn + .seg-btn { border-left: 1px solid var(--border); }

      /* ── State panel ────────────────────────── */
      .state-layout {
        display: flex; align-items: center; justify-content: center;
        gap: 8px; padding: 2px 0;
      }
      .state-name { font-size: 15px; font-weight: 600; color: var(--text-1); }
      .state-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

      /* ── Setting items ──────────────────────── */
      /* Attached tab list */
      .tab-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
      .tab-row {
        display: flex; align-items: center; gap: 8px;
        padding: 5px 8px; background: var(--bg-subtle);
        border-radius: 5px; border: 1px solid var(--border);
      }
      .tab-name {
        flex: 1; font-size: 12px; color: var(--text-1);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
      }
      .btn-detach {
        padding: 3px 8px; font-size: 11px; flex-shrink: 0;
        background: transparent; border-color: var(--border-in); color: var(--text-2);
      }
      .btn-detach:hover { background: var(--red); border-color: var(--red); color: #fff; }

      .btn-guide {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 7px 13px; border: 1px solid var(--border-in); border-radius: 6px;
        background: transparent; color: var(--text-2);
        font-size: 13px; font-weight: 500; font-family: inherit;
        cursor: pointer; text-decoration: none;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .btn-guide:hover { background: var(--bg-subtle); color: var(--text-1); border-color: var(--border); }
      .btn-guide .guide-arrow { opacity: 0.45; }

      .setting-item { padding: 14px 0; }
      .setting-item:first-child { padding-top: 0; }
      .setting-item:last-child  { padding-bottom: 0; }
      .setting-item + .setting-item { border-top: 1px solid var(--border); }

      /* ── Collapsible cards ──────────────────── */
      details.card { padding: 0; }
      details.card > summary {
        display: flex; align-items: center; justify-content: space-between;
        padding: 12px 16px; cursor: pointer; list-style: none;
        font-size: 11px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.07em;
        color: var(--text-2); user-select: none;
      }
      details.card > summary::-webkit-details-marker { display: none; }
      details.card > summary::marker { display: none; }
      details.card > .card-body { padding: 0 16px 16px; }
      .chevron {
        display: inline-block; font-style: normal;
        transition: transform 0.2s; opacity: 0.4; font-size: 10px;
      }
      details[open] > summary .chevron { transform: rotate(90deg); }

      code, pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="logo" aria-hidden="true">
          <img src="icons/icon128.png" alt="" />
        </div>
        <div>
          <h1>Local Browser Relay</h1>
          <p class="subtitle">Click the toolbar button on a tab to attach / detach.</p>
        </div>
      </header>

      <!-- State panel -->
      <div class="card">
        <div class="state-layout">
          <span class="state-dot" id="state-dot" hidden></span>
          <span class="state-name" id="state-name">—</span>
        </div>
        <div id="state-tab-count" style="display:none;text-align:center;font-size:12px;color:var(--text-2);margin-top:6px"></div>
        <div id="state-tab-list" class="tab-list" style="display:none"></div>
        <div id="state-attach-row" style="display:none;justify-content:center;align-items:center;gap:10px;margin-top:14px">
          <button id="state-attach-btn" type="button" style="padding:10px 28px;font-size:14px;font-weight:600">Attach</button>
          <a href="https://docs-operator.max0.dev/chrome-extension/" target="_blank" class="btn-guide">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
            Read guide
            <svg class="guide-arrow" xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
          </a>
        </div>
        <div id="state-login-row" style="display:none;justify-content:center;align-items:center;gap:10px;margin-top:12px">
          <button id="state-reconnect-btn" type="button" style="display:none">Reconnect</button>
          <button id="state-login-btn" type="button">Login</button>
          <a href="https://docs-operator.max0.dev/chrome-extension/" target="_blank" class="btn-guide">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
            Read guide
            <svg class="guide-arrow" xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
          </a>
        </div>
      </div>

      <!-- Settings (collapsible) -->
      <details class="card" id="settings-card" open>
        <summary>Settings <span class="chevron">▶</span></summary>
        <div class="card-body">

          <div class="setting-item">
            <label>Theme</label>
            <div class="theme-seg" id="theme-seg">
              <button class="seg-btn" data-theme-opt="system">System</button>
              <button class="seg-btn" data-theme-opt="light">Light</button>
              <button class="seg-btn" data-theme-opt="dark">Dark</button>
            </div>
          </div>

          <div class="setting-item">
            <div class="toggle-row">
              <label class="toggle">
                <input id="connect-automatically" type="checkbox" />
                <span class="toggle-track"></span>
              </label>
              <label class="toggle-label" for="connect-automatically">Auto-reconnect on error</label>
            </div>
            <p>If the relay connection drops, the extension retries every second until reconnected.</p>
          </div>

          <div class="setting-item">
            <label for="relay-url">Relay server base URL</label>
            <div class="row">
              <input id="relay-url" type="text" style="width:260px" placeholder="http://127.0.0.1:18792" />
              <button id="save" type="button">Save</button>
              <button id="test" type="button">Test</button>
            </div>
            <div class="status" id="status"></div>
          </div>

          <div class="setting-item">
            <label for="tunnel-token">Tunnel token</label>
            <div class="row">
              <button id="login" type="button">Login</button>
              <input id="tunnel-token" type="text" style="width:260px" placeholder="leave blank if not required" />
              <button id="save-token" type="button">Save</button>
              <button id="test-token" type="button">Test</button>
              <button id="clear-token" type="button">Clear</button>
            </div>
            <div class="status" id="status-token"></div>
            <div class="status" id="status-login"></div>
          </div>

        </div>
      </details>

      <!-- Connection log (collapsible) -->
      <details class="card" id="log-card">
        <summary>Connection log <span class="chevron">▶</span></summary>
        <div class="card-body">
          <pre id="conn-log" style="
            margin: 0; font-size: 11px; line-height: 1.6;
            color: var(--text-2); background: var(--bg-subtle);
            border: 1px solid var(--border); border-radius: 6px;
            padding: 10px 12px; max-height: 220px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-all;
          ">(no log entries yet)</pre>
          <button id="clear-log" type="button" style="margin-top:10px">Clear</button>
        </div>
      </details>

      <script type="module" src="options.js"></script>
    </div>
  </body>
</html>
